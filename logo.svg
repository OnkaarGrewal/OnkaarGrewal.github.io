<svg width="44" height="48" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldMetal" x1="60" y1="20" x2="150" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD98A"/>
      <stop offset="0.25" stop-color="#FDBF57"/>
      <stop offset="0.5" stop-color="#b8822c"/>
      <stop offset="0.68" stop-color="#8a611f"/>
      <stop offset="0.85" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#FFD98A"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE9B0"/>
      <stop offset="1" stop-color="#a5741f"/>
    </linearGradient>
    <radialGradient id="planetFill" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#9c0850"/>
      <stop offset="0.6" stop-color="#7A003C"/>
      <stop offset="1" stop-color="#4a0025"/>
    </radialGradient>
  </defs>

  <!-- Planet -->
  <circle cx="100" cy="132" r="52" fill="url(#planetFill)"/>
  <!-- planet inner shadow arc -->
  <path d="M 148 132 A 48 48 0 0 1 68 168" stroke="#3a001d" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- G letterform -->
  <path d="M100 84
           A48 48 0 1 0 148 148
           L148 130 L104 130 L104 144 L130 144
           A32 32 0 1 1 100 100 Z"
        fill="url(#goldMetal)" stroke="url(#goldEdge)" stroke-width="1.5"/>

  <!-- Rocket body -->
  <path d="M100 14
           C108 26 112 44 112 64
           L112 96 L88 96 L88 64
           C88 44 92 26 100 14 Z"
        fill="url(#goldMetal)" stroke="url(#goldEdge)" stroke-width="1.5"/>
  <!-- window -->
  <circle cx="100" cy="40" r="5" fill="#7A003C"/>
  <circle cx="100" cy="40" r="5" fill="none" stroke="#5a002d" stroke-width="1"/>
  <!-- fins -->
  <path d="M88 88 L74 108 L88 100 Z" fill="url(#goldMetal)" stroke="url(#goldEdge)" stroke-width="1.2"/>
  <path d="M112 88 L126 108 L112 100 Z" fill="url(#goldMetal)" stroke="url(#goldEdge)" stroke-width="1.2"/>
  <!-- exhaust nozzle -->
  <path d="M92 96 L108 96 L104 108 L96 108 Z" fill="url(#goldMetal)"/>

  <!-- Orbit ring -->
  <ellipse cx="100" cy="132" rx="76" ry="27" transform="rotate(-24 100 132)"
           stroke="url(#goldMetal)" stroke-width="5" fill="none"/>
  <ellipse cx="100" cy="132" rx="76" ry="27" transform="rotate(-24 100 132)"
           stroke="url(#goldEdge)" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Stars -->
  <path d="M146 40 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z" fill="#FDBF57"/>
  <path d="M166 62 l2 4.5 l4.5 2 l-4.5 2 l-2 4.5 l-2 -4.5 l-4.5 -2 l4.5 -2 Z" fill="#FDBF57"/>
  <circle cx="158" cy="30" r="2.4" fill="#FFD98A"/>
</svg>
