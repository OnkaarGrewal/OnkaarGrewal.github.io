<svg width="44" height="44" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="20" y1="10" x2="80" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDBF57"/>
      <stop offset="0.45" stop-color="#d9a441"/>
      <stop offset="0.7" stop-color="#b8822c"/>
      <stop offset="1" stop-color="#FDBF57"/>
    </linearGradient>
  </defs>

  <!-- Planet disc (maroon) -->
  <circle cx="50" cy="68" r="26" fill="#7A003C"/>

  <!-- G letterform sitting on the planet: outer ring + inner bar -->
  <path d="M50 44
           A24 24 0 1 0 72 78
           L72 68 L54 68 L54 74 L64 74
           A15 15 0 1 1 50 53
           Z"
        fill="url(#goldGrad)"/>

  <!-- Rocket rising through center -->
  <path d="M50 8
           C53.5 15 55 24 55 34
           L55 50 L45 50 L45 34
           C45 24 46.5 15 50 8 Z"
        fill="url(#goldGrad)"/>
  <!-- nose cone accent -->
  <circle cx="50" cy="20" r="2.4" fill="#7A003C"/>
  <!-- fins -->
  <path d="M45 46 L38 55 L45 51 Z" fill="url(#goldGrad)"/>
  <path d="M55 46 L62 55 L55 51 Z" fill="url(#goldGrad)"/>

  <!-- Orbit ring around the planet, tilted -->
  <ellipse cx="50" cy="68" rx="38" ry="14" transform="rotate(-22 50 68)"
           stroke="url(#goldGrad)" stroke-width="2.6" fill="none"/>

  <!-- Stars -->
  <path d="M72 20 l1.6 3.8 l3.8 1.6 l-3.8 1.6 l-1.6 3.8 l-1.6 -3.8 l-3.8 -1.6 l3.8 -1.6 Z" fill="#FDBF57"/>
  <circle cx="83" cy="32" r="1.7" fill="#FDBF57"/>
  <circle cx="78" cy="14" r="1.3" fill="#FDBF57"/>
</svg>
