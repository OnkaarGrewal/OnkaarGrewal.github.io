<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résumé — Onkaar Grewal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-pad { padding-top: 4.5rem; }
    .resume-wrap { max-width: 960px; margin: 0 auto; padding: 4rem 4vw 5rem; }
    .resume-hd {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 2rem; margin-bottom: 2.5rem;
    }
    .resume-title {
      font-family: var(--cond); font-weight: 900; text-transform: uppercase;
      font-size: clamp(2.5rem, 6vw, 4.5rem); letter-spacing: -0.02em;
      line-height: 0.9; color: var(--text);
    }
    .resume-title em { color: var(--orange); font-style: normal; }
    .resume-sub { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.14em; color: var(--muted); margin-top: 0.75rem; }
    .resume-actions { display: flex; gap: 0.75rem; }
    .resume-viewer {
      width: 100%; border: 1px solid var(--line);
      background: var(--s1); overflow: hidden;
    }
    .resume-viewer iframe {
      width: 100%; height: 80vh; min-height: 600px; display: block; border: none;
    }
    .resume-fallback {
      padding: 5rem 2rem; text-align: center; display: flex;
      flex-direction: column; align-items: center; gap: 1.25rem;
    }
    .resume-fallback h2 { font-family: var(--cond); font-weight: 700; font-size: 1.5rem; text-transform: uppercase; color: var(--text); }
    .resume-fallback p { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); }
    .resume-fallback code {
      font-family: var(--mono); font-size: 0.75rem; padding: 0.4rem 0.9rem;
      border: 1px solid var(--line2); color: var(--orange-l); background: var(--s2);
    }
    .contact-strip {
      display: flex; gap: 0; margin-top: 2.5rem; border: 1px solid var(--line);
    }
    .cs-item {
      flex: 1; padding: 1.1rem 1.25rem; border-right: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .cs-item:last-child { border-right: none; }
    .cs-label { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .cs-val { font-size: 0.88rem; color: var(--orange-l); transition: color 0.2s; }
    .cs-val:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav id="nav">
    <a href="index.html" class="nav-brand">Onkaar Grewal</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="resume.html" class="active cta">Résumé</a></li>
    </ul>
  </nav>
  <div class="page-pad"></div>

  <div class="resume-wrap">
    <div class="resume-hd">
      <div>
        <h1 class="resume-title"><em>Résumé</em></h1>
        <p class="resume-sub">Onkaar Grewal · Engineering Physics · McMaster · 2028</p>
      </div>
      <div class="resume-actions">
        <a href="resume.pdf" download class="btn btn-solid">Download PDF ↓</a>
        <a href="resume.pdf" target="_blank" rel="noopener" class="btn btn-ghost">Full screen ↗</a>
      </div>
    </div>

    <!--
      SETUP: Upload your CV as "resume.pdf" to the root of your repo.
      It will appear embedded here automatically.
    -->
    <div class="resume-viewer">
      <iframe src="resume.pdf" title="Onkaar Grewal — Résumé" aria-label="Résumé PDF">
        <div class="resume-fallback">
          <h2>Résumé Not Uploaded</h2>
          <p>Add your CV to the repo root as:</p>
          <code>resume.pdf</code>
          <a href="mailto:grewalo@mcmaster.ca" class="btn btn-ghost" style="margin-top:0.5rem;">Request by email ↗</a>
        </div>
      </iframe>
    </div>

    <div class="contact-strip">
      <a class="cs-item" href="mailto:grewalo@mcmaster.ca">
        <span class="cs-label">Email</span>
        <span class="cs-val">grewalo@mcmaster.ca</span>
      </a>
      <a class="cs-item" href="https://www.linkedin.com/in/onkaar-grewal-691917379/" target="_blank" rel="noopener">
        <span class="cs-label">LinkedIn</span>
        <span class="cs-val">onkaar-grewal-691917379</span>
      </a>
      <a class="cs-item" href="https://github.com/OnkaarGrewal" target="_blank" rel="noopener">
        <span class="cs-label">GitHub</span>
        <span class="cs-val">OnkaarGrewal</span>
      </a>
    </div>
  </div>

  <footer>
    <p>© 2025 Onkaar Grewal &nbsp;·&nbsp; Engineering Physics · McMaster</p>
    <nav class="foot-links">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
    </nav>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    nav.classList.add('scrolled');
  </script>
</body>
</html>
