<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Station — Onkaar Grewal</title>
  <style>
    body { margin: 0; overflow: hidden; background: #18181E; }
    #model-canvas { width: 100vw; height: 100vh; display: block; }
    #status { position: absolute; top: 10px; left: 10px; color: #FDBF57; font-family: monospace; }
  </style>
</head>
<body>
  <div id="status">Loading model...</div>
  <canvas id="model-canvas"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const canvas = document.getElementById('model-canvas');
    const status = document.getElementById('status');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    scene.background = new THREE.Color(0x18181E);
    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 5, 5);
    scene.add(light);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(2, 2, 2);

    const loader = new GLTFLoader();
    
    // Direct path: looks for the file in the SAME folder
    loader.load('./weather-station.glb', (gltf) => {
        scene.add(gltf.scene);
        status.innerText = "Model Loaded";
    }, undefined, (error) => {
        status.innerText = "ERROR: " + error.message;
        console.error("Path error:", error);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
