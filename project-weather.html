<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Station — Onkaar Grewal</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    .viewer-section { border-bottom: 1px solid var(--border); background: var(--bg2); position: relative; height: 62vh; min-height: 420px; }
    #model-canvas { width: 100%; height: 100%; display: block; cursor: grab; background: #18181E; }
    .viewer-loading { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #18181E; }
    .viewer-loading.hidden { display: none; }
    .load-ring { width: 36px; height: 36px; border: 2px solid #38383E; border-top-color: #FDBF57; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="viewer-section">
    <div class="viewer-loading" id="v-loading">
      <div class="load-ring"></div>
    </div>
    <canvas id="model-canvas"></canvas>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('model-canvas');
    const loading = document.getElementById('v-loading');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    scene.background = new THREE.Color(0x18181E);
    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 5, 5);
    scene.add(light);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(2, 2, 2);

    const loader = new GLTFLoader();
    
    // THIS IS THE FIX: Using './' tells the browser to look in the CURRENT folder
    loader.load('./weather-station.glb', (gltf) => {
        scene.add(gltf.scene);
        loading.classList.add('hidden');
    }, undefined, (error) => {
        console.error("Failed to load model. Check console for path errors.", error);
        loading.innerHTML = '<p style="color:white;">Error loading model. Check console.</p>';
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
