<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="planetGrad" cx="0.7" cy="0.85" r="0.9">
      <stop offset="0" stop-color="#1a1420"/>
      <stop offset="0.45" stop-color="#120e18"/>
      <stop offset="1" stop-color="#0A0A0C"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="0.72" cy="0.8" r="0.5">
      <stop offset="0" stop-color="#3a1528" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0A0A0C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula" cx="0.85" cy="0.35" r="0.4">
      <stop offset="0" stop-color="#4a2a1a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A0A0C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base -->
  <rect width="1920" height="1080" fill="#0A0A0C"/>
  <!-- faint warm nebula upper right -->
  <rect width="1920" height="1080" fill="url(#nebula)"/>
  <!-- planet limb glow -->
  <rect width="1920" height="1080" fill="url(#glowGrad)"/>

  <!-- Large planet curving from bottom-right -->
  <circle cx="1400" cy="1150" r="620" fill="url(#planetGrad)"/>
  <!-- subtle terminator highlight on planet edge -->
  <path d="M 820 760 A 620 620 0 0 1 1900 600"
        stroke="#2a1f30" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Starfield (sparse, small) -->
  <g fill="#ECEAE4">
    <circle cx="180" cy="140" r="1.1" opacity="0.7"/>
    <circle cx="320" cy="320" r="0.8" opacity="0.5"/>
    <circle cx="90" cy="480" r="1.0" opacity="0.6"/>
    <circle cx="500" cy="120" r="0.7" opacity="0.45"/>
    <circle cx="640" cy="400" r="0.9" opacity="0.5"/>
    <circle cx="240" cy="640" r="0.8" opacity="0.55"/>
    <circle cx="760" cy="220" r="0.7" opacity="0.4"/>
    <circle cx="1100" cy="160" r="1.0" opacity="0.6"/>
    <circle cx="1320" cy="90" r="0.8" opacity="0.5"/>
    <circle cx="1550" cy="240" r="1.1" opacity="0.65"/>
    <circle cx="1720" cy="130" r="0.7" opacity="0.45"/>
    <circle cx="1480" cy="420" r="0.8" opacity="0.5"/>
    <circle cx="1800" cy="360" r="0.9" opacity="0.55"/>
    <circle cx="1240" cy="500" r="0.7" opacity="0.4"/>
    <circle cx="60" cy="760" r="0.9" opacity="0.5"/>
    <circle cx="420" cy="820" r="0.8" opacity="0.45"/>
    <circle cx="900" cy="640" r="0.7" opacity="0.4"/>
    <circle cx="140" cy="920" r="1.0" opacity="0.55"/>
  </g>
  <!-- a couple of gold accent stars -->
  <g fill="#FDBF57">
    <circle cx="1620" cy="180" r="1.2" opacity="0.6"/>
    <circle cx="380" cy="240" r="1.0" opacity="0.5"/>
    <circle cx="1180" cy="330" r="0.9" opacity="0.45"/>
  </g>
</svg>
